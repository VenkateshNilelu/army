<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lieutenant Dashboard - Indian Army Civilian Staff</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/pages.css">
</head>
<body class="dashboard-layout">
    <header class="dashboard-header">
        <button class="hamburger-btn" id="hamburgerBtn" aria-label="Menu">☰</button>
        <div class="dashboard-header-left">
            <div class="profile-trigger" id="profileTrigger">
                <img id="profilePhotoImg" class="profile-photo" src="" alt="Photo" style="display:none;">
                <div id="profilePhotoPlaceholder" class="profile-photo-placeholder">👤</div>
                <div class="profile-info">
                    <span class="rank-name" id="profileRank">Lieutenant</span>
                    <span class="service-id" id="profileServiceId">-</span>
                </div>
            </div>
        </div>
        <div class="dashboard-header-right">
            <div class="notification-bell" id="notificationBell">
                🔔
                <span class="notification-badge" id="notificationBadge"></span>
            </div>
            <div class="notification-dropdown" id="notificationDropdown">
                <div id="notificationList"></div>
                <div class="dropdown-footer"><a href="notification-view.html">View All</a></div>
            </div>
        </div>
    </header>

    <div class="side-menu-overlay" id="sideMenuOverlay"></div>
    <aside class="side-menu" id="sideMenu">
        <div class="side-menu-header">
            <strong id="sideMenuRank">Lieutenant</strong>
            <span id="sideMenuServiceId">-</span>
        </div>
        <nav class="side-menu-nav">
            <a href="#" class="menu-item" data-modal="serviceDetails">Service Details</a>
            <a href="#" class="menu-item" data-modal="personalDetails">Personal Details</a>
            <a href="#" class="menu-item" data-modal="updatePassword">Update Password</a>
            <a href="#" class="menu-item logout" id="logoutBtn">Logout</a>
        </nav>
    </aside>

    <main class="main-content">
        <div class="greeting-section">
            <h1>Welcome Lieutenant</h1>
            <p>Manage battalion, leave approvals, and transfers</p>
        </div>
        <div class="action-cards">
            <a href="#" class="action-card" data-modal="battalionOverview">Battalion Overview</a>
            <a href="#" class="action-card" data-modal="leaveManagement">Leave Management</a>
            <a href="#" class="action-card" data-modal="salaryOverview">Salary Overview</a>
            <a href="#" class="action-card" data-modal="transferOrder">Transfer Order</a>
            <a href="#" class="action-card" data-modal="transferHistory">Transfer History</a>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="../js/data.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/modals.js"></script>
    <script src="../js/lieutenant.js"></script>
</body>
</html>
