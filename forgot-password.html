<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Indian Army Civilian Staff</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/pages.css">
</head>
<body class="auth-page">
    <header class="auth-header">
        <a href="login.html">← Back to Login</a>
    </header>

    <div class="auth-container">
        <div class="auth-card">
            <h1>Forgot Password</h1>
            <p class="forgot-password-intro">Enter your Service ID and registered email. We'll send a reset link (simulated).</p>
            <form id="forgotForm">
                <div class="form-group">
                    <label>Service ID</label>
                    <input type="text" id="fpServiceId" required>
                    <span class="error-msg" id="fpServiceIdError"></span>
                </div>
                <div class="form-group">
                    <label>Registered Email</label>
                    <input type="email" id="fpEmail" required>
                    <span class="error-msg" id="fpEmailError"></span>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Send Reset Link</button>
            </form>
            <div class="auth-links forgot-auth-links">
                <a href="login.html">Remember password? Login</a>
            </div>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/auth-pages.js"></script>
</body>
</html>
