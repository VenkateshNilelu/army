<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Indian Army Civilian Staff</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
    <header class="auth-header">
        <a href="index.html">← Back to Home</a>
    </header>

    <div class="auth-container">
        <div class="auth-card" style="max-width: 500px;">
            <h1>Registration</h1>
            <div class="progress-indicator" style="display: flex; gap: 0.5rem; margin-bottom: 1.5rem;">
                <span id="step1Indicator" class="step-active">1</span>
                <span>→</span>
                <span id="step2Indicator">2</span>
                <span>→</span>
                <span id="step3Indicator">3</span>
            </div>
            <form id="regForm" novalidate>
                <div id="step1" class="form-step">
                    <h3 style="margin-bottom: 1rem;">Service Details</h3>
                    <div class="form-group">
                        <label>Service ID</label>
                        <input type="text" id="regServiceId" required>
                        <span class="error-msg" id="regServiceIdError"></span>
                    </div>
                    <div class="form-group">
                        <label>Rank</label>
                        <select id="regRank" required>
                            <option value="">-- Select --</option>
                            <option value="Soldier">Soldier</option>
                            <option value="Lieutenant">Lieutenant</option>
                            <option value="Colonel">Colonel</option>
                            <option value="Accountant">Accountant</option>
                        </select>
                        <span class="error-msg" id="regRankError"></span>
                    </div>
                    <div class="form-group">
                        <label>Battalion</label>
                        <input type="text" id="battalion" placeholder="e.g. B1">
                        <span class="error-msg" id="battalionError"></span>
                    </div>
                    <div class="form-group">
                        <label>Joining Date</label>
                        <input type="date" id="joiningDate" required>
                        <span class="error-msg" id="joiningDateError"></span>
                    </div>
                </div>
                <div id="step2" class="form-step" style="display: none;">
                    <h3 style="margin-bottom: 1rem;">Personal Details</h3>
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="fullName" required>
                        <span class="error-msg" id="fullNameError"></span>
                    </div>
                    <div class="form-group">
                        <label>Date of Birth</label>
                        <input type="date" id="dob" required>
                        <span class="error-msg" id="dobError"></span>
                    </div>
                    <div class="form-group">
                        <label>Mobile</label>
                        <input type="tel" id="regMobile" maxlength="10" pattern="[0-9]{10}" required>
                        <span class="error-msg" id="regMobileError"></span>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="regEmail" required>
                        <span class="error-msg" id="regEmailError"></span>
                    </div>
                    <div class="form-group">
                        <label>Address</label>
                        <input type="text" id="address" required>
                        <span class="error-msg" id="addressError"></span>
                    </div>
                    <div class="form-group">
                        <label>Profile Photo</label>
                        <input type="file" id="profilePhoto" accept="image/*">
                    </div>
                </div>
                <div id="step3" class="form-step" style="display: none;">
                    <h3 style="margin-bottom: 1rem;">Family Details</h3>
                    <div class="form-group">
                        <label>Father's Name</label>
                        <input type="text" id="fatherName" required>
                        <span class="error-msg" id="fatherNameError"></span>
                    </div>
                    <div class="form-group">
                        <label>Mother's Name</label>
                        <input type="text" id="motherName" required>
                        <span class="error-msg" id="motherNameError"></span>
                    </div>
                    <div class="form-group">
                        <label>Spouse Name</label>
                        <input type="text" id="spouseName" placeholder="Optional">
                    </div>
                    <div class="form-group">
                        <label>Emergency Contact</label>
                        <input type="tel" id="emergencyContact" maxlength="10" required>
                        <span class="error-msg" id="emergencyContactError"></span>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="regPassword" required minlength="6">
                        <span class="error-msg" id="regPasswordError"></span>
                    </div>
                </div>
                <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                    <button type="button" id="prevBtn" class="btn btn-outline" style="display: none;">Previous</button>
                    <button type="button" id="nextBtn" class="btn btn-primary">Next</button>
                    <button type="submit" id="submitBtn" class="btn btn-primary" style="display: none;">Submit</button>
                </div>
            </form>
            <div class="auth-links" style="margin-top: 1rem;">
                <a href="login.html">Already have an account? Login</a>
            </div>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script>
        Auth.init();

        let currentStep = 1;
        const totalSteps = 3;
        let photoData = null;

        function showStep(n) {
            document.querySelectorAll('.form-step').forEach((s, i) => {
                s.style.display = i + 1 === n ? 'block' : 'none';
            });
            document.getElementById('prevBtn').style.display = n > 1 ? 'inline-block' : 'none';
            document.getElementById('nextBtn').style.display = n < totalSteps ? 'inline-block' : 'none';
            document.getElementById('submitBtn').style.display = n === totalSteps ? 'inline-block' : 'none';
            ['step1Indicator','step2Indicator','step3Indicator'].forEach((id, i) => {
                document.getElementById(id).className = i + 1 <= n ? 'step-active' : '';
            });
            currentStep = n;
        }

        function validateStep(n) {
            let valid = true;
            const ids = {
                1: ['regServiceId','regRank','battalion','joiningDate'],
                2: ['fullName','dob','regMobile','regEmail','address'],
                3: ['fatherName','motherName','emergencyContact','regPassword']
            };
            ids[n].forEach(id => {
                const el = document.getElementById(id);
                const err = document.getElementById(id + 'Error');
                if (!el) return;
                err.textContent = '';
                el.classList.remove('error');
                if (el.hasAttribute('required') && !el.value.trim()) {
                    err.textContent = 'Required';
                    el.classList.add('error');
                    valid = false;
                }
                if (id === 'regMobile' && el.value && !/^[6-9]\d{9}$/.test(el.value)) {
                    err.textContent = 'Valid 10-digit mobile';
                    el.classList.add('error');
                    valid = false;
                }
                if (id === 'regEmail' && el.value && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(el.value)) {
                    err.textContent = 'Valid email';
                    el.classList.add('error');
                    valid = false;
                }
            });
            return valid;
        }

        document.getElementById('nextBtn').addEventListener('click', () => {
            if (validateStep(currentStep)) showStep(currentStep + 1);
        });
        document.getElementById('prevBtn').addEventListener('click', () => showStep(currentStep - 1));

        document.getElementById('profilePhoto').addEventListener('change', (e) => {
            const f = e.target.files[0];
            if (f) {
                const r = new FileReader();
                r.onload = () => photoData = r.result;
                r.readAsDataURL(f);
            }
        });

        document.getElementById('regForm').addEventListener('submit', (e) => {
            e.preventDefault();
            if (!validateStep(3)) return;
            const existing = DataStorage.getUser(document.getElementById('regServiceId').value.trim());
            if (existing) {
                document.getElementById('regServiceIdError').textContent = 'Service ID already exists';
                document.getElementById('regServiceId').classList.add('error');
                return;
            }
            const user = {
                id: document.getElementById('regServiceId').value.trim(),
                serviceId: document.getElementById('regServiceId').value.trim(),
                rank: document.getElementById('regRank').value,
                password: document.getElementById('regPassword').value,
                name: document.getElementById('fullName').value.trim(),
                email: document.getElementById('regEmail').value.trim(),
                mobile: document.getElementById('regMobile').value.trim(),
                battalion: document.getElementById('battalion').value.trim() || '-',
                joiningDate: document.getElementById('joiningDate').value,
                fatherName: document.getElementById('fatherName').value.trim(),
                motherName: document.getElementById('motherName').value.trim(),
                spouseName: document.getElementById('spouseName').value.trim() || '-',
                emergencyContact: document.getElementById('emergencyContact').value.trim(),
                dob: document.getElementById('dob').value,
                address: document.getElementById('address').value.trim(),
                photo: photoData,
                blocked: false
            };
            if (user.rank === 'Lieutenant' || user.rank === 'Soldier') user.reportsTo = '';
            DataStorage.addUser(user);
            alert('Registration successful! Please login.');
            window.location.href = 'login.html';
        });

        showStep(1);
    </script>
</body>
</html>
