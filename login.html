<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Indian Army Civilian Staff</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/pages.css">
</head>
<body class="auth-page">
    <header class="auth-header">
        <a href="index.html">← Back to Home</a>
    </header>

    <div class="auth-container">
        <div class="auth-card">
            <h1>Login</h1>
            <form id="loginForm" novalidate>
                <div class="form-group">
                    <label>Service ID</label>
                    <input type="text" id="serviceId" name="serviceId" placeholder="e.g. ABCD123456" required>
                    <span class="error-msg" id="serviceIdError"></span>
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <select id="loginRole" name="loginRole" required>
                        <option value="">-- Select Role --</option>
                        <option value="Soldier">Soldier</option>
                        <option value="Lieutenant">Lieutenant</option>
                        <option value="Colonel">Colonel</option>
                        <option value="Accountant">Accountant</option>
                        <option value="Admin">Admin</option>
                    </select>
                    <span class="error-msg" id="loginRoleError"></span>
                </div>
                <div class="form-group">
                    <label>Mobile / Email</label>
                    <input type="text" id="loginMobileOrEmail" name="loginMobileOrEmail" placeholder="10-digit mobile or email" required>
                    <span class="error-msg" id="loginMobileOrEmailError"></span>
                </div>
                <div class="form-group" id="otpGroup">
                    <label>OTP</label>
                    <div style="display:flex;gap:0.5rem;align-items:center;">
                        <input type="text" id="loginOtp" name="loginOtp" placeholder="6-digit OTP" maxlength="6" pattern="[0-9]{6}" style="flex:1;">
                        <button type="button" id="verifyOtpBtn" class="btn btn-success" style="display:none;">Verify OTP</button>
                    </div>
                    <span class="error-msg" id="loginOtpError"></span>
                    <small>Default OTP: 123456 (simulation)</small>
                </div>
                <button type="button" id="sendOtpBtn" class="btn btn-otp btn-block">Send OTP</button>
                <div class="form-group">
                    <label>Password</label>
                    <div style="position:relative;display:flex;align-items:center;">
                        <input type="password" id="loginPassword" name="loginPassword" placeholder="Password" required minlength="8" maxlength="12" style="flex:1;">
                        <button type="button" id="toggleLoginPassword" tabindex="-1" style="background:none;border:none;position:absolute;right:10px;top:50%;transform:translateY(-50%);cursor:pointer;padding:0;">
                            <span id="loginPasswordEye" aria-label="Show password" style="font-size:1.2em;">👁️</span>
                        </button>
                    </div>
                    <span class="error-msg" id="loginPasswordError"></span>
                   
                    </ul>
                </div>
                <button type="submit" id="loginBtn" class="btn btn-primary btn-block">Login</button>
            </form>
            <div class="auth-links">
                <a href="register.html">Register</a>
                <a href="forgot-password.html">Forgot Password?</a>
            </div>
            
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/auth-pages.js"></script>
    <script>
    // Show/hide password toggle for login
    document.addEventListener('DOMContentLoaded', function() {
        var pwd = document.getElementById('loginPassword');
        var btn = document.getElementById('toggleLoginPassword');
        var eye = document.getElementById('loginPasswordEye');
        if (pwd && btn && eye) {
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                if (pwd.type === 'password') {
                    pwd.type = 'text';
                    eye.textContent = '🙈';
                    eye.setAttribute('aria-label', 'Hide password');
                } else {
                    pwd.type = 'password';
                    eye.textContent = '👁️';
                    eye.setAttribute('aria-label', 'Show password');
                }
            });
        }
    });
    </script>
</body>
</html>
